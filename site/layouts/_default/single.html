{{ define "main" }}
<div class="container">
  <article>
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <div class="post-meta">
        <span>{{ .Date.Format "2 January 2006" }}</span>
        {{ with .ReadingTime }}<span>{{ . }} min read</span>{{ end }}
        {{ with .Params.categories }}<span>{{ index . 0 }}</span>{{ end }}
      </div>
    </header>

    <div class="post-content">
      {{ .Content }}
    </div>

    <footer class="post-footer">
      {{ with .Params.tags }}
      <ul class="tag-list">
        {{ range . }}
        <li><a href="{{ "/tags/" | relURL }}{{ . | urlize }}/">{{ . }}</a></li>
        {{ end }}
      </ul>
      {{ end }}
    </footer>
  </article>
</div>
{{ end }}
